#cloud-config
# Turnkey cloud-init user-data for a single-host mizu deployment.
#
# Provision a VPS (Hetzner CAX, Oracle ARM, DigitalOcean droplet, AWS
# Lightsail, anything that takes cloud-init), paste this as the
# user-data, and at first boot:
#
#   1. Docker Engine installs from the official repo.
#   2. /opt/mizu/docker-compose.yml is dropped into place.
#   3. Compose pulls ghcr.io/nchapman/mizu:latest and Watchtower.
#   4. Mizu listens on :80 (always 308-redirects to :443) and :443
#      (HTTPS, with a self-signed cert until you finish the wizard).
#
# Then in a browser:
#   - Point your domain's A record at the VPS's public IP.
#   - Visit https://<that-ip>/admin (raw IP is fine; DNS doesn't
#     need to have propagated yet). Your browser will show a
#     "Not Secure" warning because the cert is self-signed at this
#     point — click "Advanced" → "Proceed" to continue. This is
#     expected and goes away once Let's Encrypt issues a real cert.
#   - The setup wizard walks you through account, site basics, the
#     DNS preflight, and Let's Encrypt issuance.
#
# The one-hour first-run claim window starts the moment cloud-init
# brings the container up. If you miss it, SSH in and restart mizu:
#   docker compose -f /opt/mizu/docker-compose.yml restart mizu
# The window is in-memory and resets on every restart.
#
# Watchtower polls GHCR hourly. New `vX.Y.Z` tags published from the
# mizu repo move the `:latest` tag, which Watchtower picks up and
# rolls in. Pre-release tags (e.g. `v1.0.0-rc1`) do NOT move :latest,
# so production hosts only auto-update on stable releases.

package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - ufw
  - unattended-upgrades

write_files:
  # Ubuntu cloud images ship with unattended-upgrades enabled for
  # security updates by default, but auto-reboot is off — so kernel
  # and libc patches don't take effect until someone reboots. For a
  # single-host personal appliance with a non-Linux operator that's
  # a foot-gun, so we flip it on. We deliberately don't pin a reboot
  # time: VPS hosts run UTC, the operator's timezone is unknown, and
  # the default behavior (reboot when the apt-daily-upgrade timer
  # fires, ~06:00 UTC with random jitter) is no worse than any fixed
  # time we could pick and avoids a synchronized fleet-wide reboot.
  # The mizu container has restart: unless-stopped so it comes back
  # automatically.
  - path: /etc/apt/apt.conf.d/52unattended-upgrades-local
    permissions: "0644"
    owner: root:root
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";

  - path: /opt/mizu/docker-compose.yml
    permissions: "0644"
    owner: root:root
    content: |
      services:
        mizu:
          image: ghcr.io/nchapman/mizu:latest
          container_name: mizu
          restart: unless-stopped
          entrypoint: ["/app/mizu", "--config", "/app/state/config.yml"]
          ports:
            # Host :80 -> internal plain-HTTP listener (unprivileged,
            # high port inside the container). Host :443 -> internal
            # HTTPS listener, bound once the wizard enables HTTPS.
            - "80:8080"
            - "443:8443"
          volumes:
            - content:/app/content
            - media:/app/media
            - cache:/app/cache
            - state:/app/state
          labels:
            com.centurylinklabs.watchtower.enable: "true"

        watchtower:
          image: containrrr/watchtower:latest
          container_name: watchtower
          restart: unless-stopped
          environment:
            WATCHTOWER_LABEL_ENABLE: "true"
            WATCHTOWER_CLEANUP: "true"
            WATCHTOWER_POLL_INTERVAL: "3600"
            WATCHTOWER_ROLLING_RESTART: "true"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock

      volumes:
        content:
        media:
        cache:
        state:

runcmd:
  # Install Docker Engine from the official repository. The
  # convenience script is the supported install path for fresh VMs;
  # it handles repo setup and signing keys for whichever distro
  # cloud-init landed us on.
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker

  # Minimal firewall: SSH plus the two ports mizu binds on the host.
  # ufw is opt-in (cloud-init's package list above installed it but
  # didn't enable it) so operators who already have a hosting-level
  # firewall can comment this block out without conflict.
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Bring mizu up. `docker compose` (no hyphen) is the v2 plugin
  # shipped by get.docker.com on supported distros.
  - docker compose -f /opt/mizu/docker-compose.yml up -d

final_message: "mizu is up. Open https://<this-host>/admin to finish setup. Click through the one-time browser cert warning (mizu boots with a self-signed cert; the wizard's HTTPS step issues a real Let's Encrypt cert that the browser trusts). First boot can take a minute or two while Docker pulls the image."
