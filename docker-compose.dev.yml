# Two-instance development stack for exercising cross-instance flows
# (webmentions, feed subscriptions) between two repeat servers.
#
# Browser:    http://localhost:8081/admin   (Alice)
#             http://localhost:8082/admin   (Bob)
# Inter-pod:  http://alice:8080  /  http://bob:8080  (docker network DNS)
#
# Both instances run with REPEAT_ALLOW_PRIVATE_HOSTS=1 so safehttp will
# permit dialing the docker bridge network. Never set that variable in
# production — it disables SSRF protection.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   # First-run setup tokens are printed to each container's log.
#   docker compose -f docker-compose.dev.yml logs alice | grep "setup token"
#   docker compose -f docker-compose.dev.yml logs bob   | grep "setup token"
#
# Reset state:
#   docker compose -f docker-compose.dev.yml down
#   rm -rf dev/alice/{cache,state,media,content/posts,content/drafts}/* \
#          dev/bob/{cache,state,media,content/posts,content/drafts}/*

services:
  alice:
    build: .
    container_name: repeat-alice
    hostname: alice
    environment:
      REPEAT_ALLOW_PRIVATE_HOSTS: "1"
    ports:
      - "8081:8080"
    volumes:
      - ./dev/alice/config.yml:/app/config.yml:ro
      - ./dev/alice/content:/app/content
      - ./dev/alice/media:/app/media
      - ./dev/alice/cache:/app/cache
      - ./dev/alice/state:/app/state
    networks: [repeatnet]

  bob:
    build: .
    container_name: repeat-bob
    hostname: bob
    environment:
      REPEAT_ALLOW_PRIVATE_HOSTS: "1"
    ports:
      - "8082:8080"
    volumes:
      - ./dev/bob/config.yml:/app/config.yml:ro
      - ./dev/bob/content:/app/content
      - ./dev/bob/media:/app/media
      - ./dev/bob/cache:/app/cache
      - ./dev/bob/state:/app/state
    networks: [repeatnet]

networks:
  repeatnet:
